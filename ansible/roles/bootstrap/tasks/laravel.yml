---
# Laravel-specific bootstrap tasks

# Get port configuration from projects.yml
# Supports both postgres and mysql port keys
- name: Set Laravel port defaults
  ansible.builtin.set_fact:
    nginx_port: "{{ project.ports.nginx | default(8010) }}"
    postgres_port: "{{ project.ports.postgres | default(project.ports.mysql | default(5440)) }}"
    mysql_port: "{{ project.ports.mysql | default(project.ports.postgres | default(3306)) }}"
    redis_port: "{{ project.ports.redis | default(6390) }}"
    minio_api_port: "{{ project.ports.minio_api | default(9010) }}"
    minio_console_port: "{{ project.ports.minio_console | default(9011) }}"
    mailpit_smtp_port: "{{ project.ports.mailpit_smtp | default(1030) }}"
    mailpit_web_port: "{{ project.ports.mailpit_web | default(8030) }}"
    meilisearch_port: "{{ project.ports.meilisearch | default(7700) }}"
    include_meilisearch: "{{ project.ports.meilisearch is defined }}"
  when: project.ports is defined

- name: Set Laravel port defaults (no ports defined)
  ansible.builtin.set_fact:
    nginx_port: 8010
    postgres_port: 5440
    mysql_port: 3306
    redis_port: 6390
    minio_api_port: 9010
    minio_console_port: 9011
    mailpit_smtp_port: 1030
    mailpit_web_port: 8030
    meilisearch_port: 7700
    include_meilisearch: false
  when: project.ports is not defined

- name: Set Laravel PHP compatibility version
  ansible.builtin.set_fact:
    laravel_php_version: "{{ project.extras.php_version | default('8.2') }}"
    laravel_node_version: "{{ project.extras.node_version | default('') }}"
    laravel_db_connection: "{{ project.extras.db_connection | default('pgsql') }}"
    laravel_mysql_username: "{{ project_name | replace('-', '_') }}"
    laravel_mysql_additional_databases: >-
      {{
        (project.extras.mysql_additional_databases | default([]))
        | unique
        | reject('equalto', project_name | replace('-', '_'))
        | list
      }}

# === Copy secrets (only if not already in project) ===
- name: Check if secrets directory exists
  ansible.builtin.stat:
    path: "{{ secrets_dir }}"
  register: secrets_dir_stat

- name: Check if .env exists in project
  ansible.builtin.stat:
    path: "{{ project_path }}/.env"
  register: project_env_stat

- name: Copy .env from secrets (only if missing)
  ansible.builtin.copy:
    src: "{{ secrets_dir }}/.env"
    dest: "{{ project_path }}/.env"
    mode: '0600'
    remote_src: true
  when:
    - secrets_dir_stat.stat.exists
    - secrets_dir_stat.stat.isdir
    - not project_env_stat.stat.exists

- name: Check if auth.json exists in project
  ansible.builtin.stat:
    path: "{{ project_path }}/auth.json"
  register: project_auth_stat

- name: Check if auth.json exists in secrets
  ansible.builtin.stat:
    path: "{{ secrets_dir }}/auth.json"
  register: secrets_auth_stat

- name: Copy auth.json from secrets (only if missing from project but exists in secrets)
  ansible.builtin.copy:
    src: "{{ secrets_dir }}/auth.json"
    dest: "{{ project_path }}/auth.json"
    mode: '0600'
    remote_src: true
  when:
    - secrets_dir_stat.stat.exists
    - secrets_dir_stat.stat.isdir
    - secrets_auth_stat.stat.exists
    - not project_auth_stat.stat.exists

- name: Check if .npmrc exists in secrets
  ansible.builtin.stat:
    path: "{{ secrets_dir }}/.npmrc"
  register: secrets_npmrc_stat

- name: Copy .npmrc from secrets for private npm packages
  ansible.builtin.copy:
    src: "{{ secrets_dir }}/.npmrc"
    dest: "{{ project_path }}/.npmrc"
    mode: '0600'
    remote_src: true
    force: true
  when:
    - secrets_dir_stat.stat.exists
    - secrets_dir_stat.stat.isdir
    - secrets_npmrc_stat.stat.exists

- name: Check if .env exists after secrets sync
  ansible.builtin.stat:
    path: "{{ project_path }}/.env"
  register: project_env_after_sync

# === Normalize Laravel .env for Dockerized bootstrap ===
- name: Ensure .env has Docker-compatible Laravel defaults
  ansible.builtin.lineinfile:
    path: "{{ project_path }}/.env"
    regexp: "^#?{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    create: false
  loop:
    - { key: "APP_NAME", value: '"{{ project_name | replace("-", " ") | title }}"' }
    - { key: "DB_CONNECTION", value: "{{ laravel_db_connection }}" }
    - { key: "DB_HOST", value: "{{ 'mysql' if laravel_db_connection == 'mysql' else 'postgres' }}" }
    - { key: "DB_PORT", value: "{{ '3306' if laravel_db_connection == 'mysql' else '5432' }}" }
    - { key: "DB_DATABASE", value: "{{ project_name | replace('-', '_') }}" }
    - { key: "DB_USERNAME", value: "{{ project_name | replace('-', '_') }}" }
    - { key: "DB_PASSWORD", value: "{{ project_name }}-dev-secret" }
    - { key: "SESSION_DRIVER", value: "redis" }
    - { key: "QUEUE_CONNECTION", value: "redis" }
    - { key: "CACHE_DRIVER", value: "redis" }
    - { key: "CACHE_STORE", value: "redis" }
    - { key: "REDIS_HOST", value: "redis" }
    - { key: "REDIS_PORT", value: "6379" }
    - { key: "REDIS_PASSWORD", value: "null" }
    - { key: "MAIL_MAILER", value: "smtp" }
    - { key: "MAIL_HOST", value: "host.docker.internal" }
    - { key: "MAIL_PORT", value: "1025" }
    - { key: "MAIL_USERNAME", value: "null" }
    - { key: "MAIL_PASSWORD", value: "null" }
    - { key: "MAIL_ENCRYPTION", value: "null" }
    - { key: "MAIL_FROM_NAME", value: '"${APP_NAME}"' }
  when:
    - project_env_after_sync.stat.exists

# === Docker compose ===
- name: Check if docker-compose.yml exists
  ansible.builtin.stat:
    path: "{{ project_path }}/docker-compose.yml"
  register: docker_compose_stat

- name: Read existing docker-compose.yml when present
  ansible.builtin.slurp:
    path: "{{ project_path }}/docker-compose.yml"
  register: docker_compose_existing
  when: docker_compose_stat.stat.exists

- name: Detect legacy Laravel Sail docker-compose config
  ansible.builtin.set_fact:
    docker_compose_uses_sail_runtime: >-
      {{
        (docker_compose_existing.content | b64decode)
        is search('vendor/laravel/sail/runtimes')
      }}
  when: docker_compose_stat.stat.exists

- name: Generate docker-compose.yml
  ansible.builtin.template:
    src: laravel-docker-compose.yml.j2
    dest: "{{ project_path }}/docker-compose.yml"
    mode: '0644'
  when:
    - not docker_compose_stat.stat.exists or (docker_compose_uses_sail_runtime | default(false))

# === Copy Docker configs from reference project ===
- name: Check if reference project has Docker configs
  ansible.builtin.stat:
    path: "{{ reference_project }}/docker/php/Dockerfile"
  register: reference_docker_stat

- name: Ensure docker/php directory exists
  ansible.builtin.file:
    path: "{{ project_path }}/docker/php"
    state: directory
    mode: '0755'
  when: reference_docker_stat.stat.exists

- name: Ensure docker/nginx directory exists
  ansible.builtin.file:
    path: "{{ project_path }}/docker/nginx"
    state: directory
    mode: '0755'
  when: reference_docker_stat.stat.exists

- name: Copy Dockerfile from reference project
  ansible.builtin.copy:
    src: "{{ reference_project }}/docker/php/Dockerfile"
    dest: "{{ project_path }}/docker/php/Dockerfile"
    mode: '0644'
    remote_src: true
    force: false  # Don't overwrite if exists
  when: reference_docker_stat.stat.exists

- name: Copy php.ini from reference project
  ansible.builtin.copy:
    src: "{{ reference_project }}/docker/php/php.ini"
    dest: "{{ project_path }}/docker/php/php.ini"
    mode: '0644'
    remote_src: true
    force: false
  when: reference_docker_stat.stat.exists
  ignore_errors: true

- name: Copy nginx config from reference project
  ansible.builtin.copy:
    src: "{{ reference_project }}/docker/nginx/default.conf"
    dest: "{{ project_path }}/docker/nginx/default.conf"
    mode: '0644'
    remote_src: true
    force: false
  when: reference_docker_stat.stat.exists
  ignore_errors: true

# === Ensure shared mailpit is running ===
- name: Check if shared mailpit container is running
  ansible.builtin.command:
    cmd: docker ps --filter "name=^mailpit$" --filter "status=running" --format "{{ '{{' }}.Names{{ '}}' }}"
  register: mailpit_check
  changed_when: false

- name: Start shared mailpit container
  ansible.builtin.command:
    cmd: docker compose -f {{ ansible_facts.env.HOME }}/Omarchy/services/mailpit/docker-compose.yml up -d
  when: mailpit_check.stdout | length == 0
  changed_when: true

# === Build Docker images ===
- name: Check if docker-compose.yml exists for build
  ansible.builtin.stat:
    path: "{{ project_path }}/docker-compose.yml"
  register: docker_compose_for_build

- name: Check if composer.json exists before Docker build
  ansible.builtin.stat:
    path: "{{ project_path }}/composer.json"
  register: composer_json_prebuild

- name: Check if Laravel Sail runtime exists before Docker build
  ansible.builtin.stat:
    path: "{{ project_path }}/vendor/laravel/sail/runtimes/{{ laravel_php_version }}"
  register: sail_runtime_prebuild
  when:
    - composer_json_prebuild.stat.exists
    - docker_compose_uses_sail_runtime | default(false)

- name: Install Composer dependencies locally when Sail runtime is missing
  ansible.builtin.command:
    cmd: composer install --no-interaction --prefer-dist --no-progress
    chdir: "{{ project_path }}"
  register: composer_install_local
  changed_when: "'Installing' in composer_install_local.stdout or 'Updating' in composer_install_local.stdout"
  failed_when: false
  when:
    - docker_compose_for_build.stat.exists
    - composer_json_prebuild.stat.exists
    - docker_compose_uses_sail_runtime | default(false)
    - not sail_runtime_prebuild.stat.exists

- name: Re-check Laravel Sail runtime after local Composer install
  ansible.builtin.stat:
    path: "{{ project_path }}/vendor/laravel/sail/runtimes/{{ laravel_php_version }}"
  register: sail_runtime_after_local_composer
  when:
    - docker_compose_for_build.stat.exists
    - composer_json_prebuild.stat.exists
    - docker_compose_uses_sail_runtime | default(false)

- name: Fail when Laravel Sail runtime is still missing before Docker build
  ansible.builtin.fail:
    msg: >-
      Docker build requires Laravel Sail runtime at
      {{ project_path }}/vendor/laravel/sail/runtimes/{{ laravel_php_version }},
      but it is still missing after local composer install.
      Local composer rc={{ composer_install_local.rc | default('not-run') }}.
      stderr={{ composer_install_local.stderr | default('') }}
  when:
    - docker_compose_for_build.stat.exists
    - composer_json_prebuild.stat.exists
    - docker_compose_uses_sail_runtime | default(false)
    - not sail_runtime_after_local_composer.stat.exists

- name: Build Docker images
  ansible.builtin.command:
    cmd: docker compose build
    chdir: "{{ project_path }}"
  register: docker_build
  changed_when: "'Building' in docker_build.stdout or 'building' in docker_build.stderr"
  failed_when: false
  when: docker_compose_for_build.stat.exists

- name: Determine if Docker build failed due to missing Sail runtime
  ansible.builtin.set_fact:
    docker_build_missing_sail_runtime: >-
      {{
        docker_build.rc != 0 and
        'vendor/laravel/sail/runtimes' in (docker_build.stderr | default(''))
      }}
  when: docker_compose_for_build.stat.exists

- name: Retry Composer locally when Docker build fails from missing Sail runtime
  ansible.builtin.command:
    cmd: composer install --no-interaction --prefer-dist --no-progress
    chdir: "{{ project_path }}"
  register: composer_install_after_build_error
  changed_when: "'Installing' in composer_install_after_build_error.stdout or 'Updating' in composer_install_after_build_error.stdout"
  failed_when: false
  when:
    - docker_compose_for_build.stat.exists
    - docker_build_missing_sail_runtime | default(false)
    - composer_json_prebuild.stat.exists

- name: Rebuild Docker images after Composer install fallback
  ansible.builtin.command:
    cmd: docker compose build
    chdir: "{{ project_path }}"
  register: docker_build_retry
  changed_when: "'Building' in docker_build_retry.stdout or 'building' in docker_build_retry.stderr"
  failed_when: false
  when:
    - docker_compose_for_build.stat.exists
    - docker_build_missing_sail_runtime | default(false)
    - composer_json_prebuild.stat.exists

- name: Fail when Docker build still fails after Composer fallback
  ansible.builtin.fail:
    msg: >-
      Docker build failed after Composer fallback.
      First build rc={{ docker_build.rc }}.
      Composer fallback rc={{ composer_install_after_build_error.rc | default('not-run') }}.
      Retry build rc={{ docker_build_retry.rc | default('not-run') }}.
      Retry stderr={{ docker_build_retry.stderr | default(docker_build.stderr | default('')) }}
  when:
    - docker_compose_for_build.stat.exists
    - docker_build_missing_sail_runtime | default(false)
    - (docker_build_retry.rc | default(1)) != 0

- name: Fail when Docker build fails for non-Sail reason
  ansible.builtin.fail:
    msg: >-
      Docker build failed (rc={{ docker_build.rc }}):
      {{ docker_build.stderr | default('no stderr') }}
  when:
    - docker_compose_for_build.stat.exists
    - docker_build.rc != 0
    - not (docker_build_missing_sail_runtime | default(false))

# === Start Docker services ===
- name: Check if main container is running
  ansible.builtin.command:
    cmd: docker ps --filter "name={{ project_name }}-php" --filter "status=running" --format "{{ '{{' }}.Names{{ '}}' }}"
  register: php_container_check
  changed_when: false
  when: docker_compose_for_build.stat.exists

- name: Start Docker services (only if not already running)
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ project_path }}"
  register: docker_up
  retries: 3
  delay: 5
  until: docker_up.rc == 0
  failed_when: false
  changed_when: "'Started' in docker_up.stderr or 'Creating' in docker_up.stderr"
  when:
    - docker_compose_for_build.stat.exists
    - php_container_check.stdout | length == 0

- name: Fail when Docker services cannot start
  ansible.builtin.fail:
    msg: >-
      docker compose up -d failed (rc={{ docker_up.rc | default('not-run') }})
      in {{ project_path }}.
      stderr={{ docker_up.stderr | default('') }}
  when:
    - docker_compose_for_build.stat.exists
    - php_container_check.stdout | length == 0
    - (docker_up.rc | default(0)) != 0

- name: Ensure additional MySQL databases are created and granted
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - exec
      - -T
      - mysql
      - mysql
      - -uroot
      - "-p{{ project_name }}-dev-secret"
      - -e
      - "CREATE DATABASE IF NOT EXISTS `{{ item }}`; GRANT ALL PRIVILEGES ON `{{ item }}`.* TO '{{ laravel_mysql_username }}'@'%';"
    chdir: "{{ project_path }}"
  loop: "{{ laravel_mysql_additional_databases }}"
  changed_when: false
  when:
    - docker_compose_for_build.stat.exists
    - laravel_db_connection == 'mysql'
    - laravel_mysql_additional_databases | length > 0

# === Fix storage permissions ===
# Docker containers may create files as root, fix ownership first
- name: Check if storage directory exists
  ansible.builtin.stat:
    path: "{{ project_path }}/storage"
  register: storage_dir

- name: Fix storage ownership (Docker may create files as root)
  ansible.builtin.command:
    cmd: chown -R {{ ansible_facts.env.USER }}:{{ ansible_facts.env.USER }} {{ project_path }}/storage {{ project_path }}/bootstrap/cache
  become: true
  when: storage_dir.stat.exists
  changed_when: false

- name: Fix node_modules ownership (if exists and owned by root)
  ansible.builtin.command:
    cmd: chown -R {{ ansible_facts.env.USER }}:{{ ansible_facts.env.USER }} {{ project_path }}/node_modules
  become: true
  when: storage_dir.stat.exists
  changed_when: false
  failed_when: false

# Docker containers run as www-data, so storage must be world-writable
- name: Ensure storage directories exist with proper permissions
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0777'
  loop:
    - "{{ project_path }}/storage"
    - "{{ project_path }}/storage/app"
    - "{{ project_path }}/storage/app/public"
    - "{{ project_path }}/storage/framework"
    - "{{ project_path }}/storage/framework/cache"
    - "{{ project_path }}/storage/framework/sessions"
    - "{{ project_path }}/storage/framework/views"
    - "{{ project_path }}/storage/logs"
    - "{{ project_path }}/bootstrap/cache"
  when: storage_dir.stat.exists

- name: Ensure laravel.log exists with proper permissions
  ansible.builtin.file:
    path: "{{ project_path }}/storage/logs/laravel.log"
    state: touch
    mode: '0666'
    modification_time: preserve
    access_time: preserve
  when: storage_dir.stat.exists

# === Wait for services ===
- name: Wait for PHP container to be ready
  ansible.builtin.pause:
    seconds: 5
  when: docker_compose_for_build.stat.exists

# === Install dependencies ===
- name: Check if composer.json exists
  ansible.builtin.stat:
    path: "{{ project_path }}/composer.json"
  register: composer_json

- name: Install PHP dependencies via Composer
  ansible.builtin.command:
    cmd: docker compose exec -T php composer install --no-interaction --prefer-dist --optimize-autoloader
    chdir: "{{ project_path }}"
  register: composer_install
  changed_when: "'Installing' in composer_install.stdout or 'Updating' in composer_install.stdout"
  failed_when: false
  when: composer_json.stat.exists and docker_compose_for_build.stat.exists

- name: Check for project Dockerfile before PHP version fallback
  ansible.builtin.stat:
    path: "{{ project_path }}/docker/php/Dockerfile"
  register: php_dockerfile_stat
  when:
    - composer_json.stat.exists
    - docker_compose_for_build.stat.exists
    - composer_install.rc != 0
    - "'your php version' in composer_install.stderr"
    - "'does not satisfy that requirement' in composer_install.stderr"

- name: Pin PHP image version in Dockerfile for Composer compatibility
  ansible.builtin.lineinfile:
    path: "{{ project_path }}/docker/php/Dockerfile"
    regexp: '^FROM php:'
    line: "FROM php:{{ laravel_php_version }}-fpm-alpine"
  when:
    - composer_json.stat.exists
    - docker_compose_for_build.stat.exists
    - composer_install.rc != 0
    - "'your php version' in composer_install.stderr"
    - "'does not satisfy that requirement' in composer_install.stderr"
    - php_dockerfile_stat.stat.exists

- name: Rebuild PHP container after Dockerfile PHP version pin
  ansible.builtin.command:
    cmd: docker compose build php
    chdir: "{{ project_path }}"
  register: php_rebuild
  changed_when: true
  when:
    - composer_json.stat.exists
    - docker_compose_for_build.stat.exists
    - composer_install.rc != 0
    - "'your php version' in composer_install.stderr"
    - "'does not satisfy that requirement' in composer_install.stderr"
    - php_dockerfile_stat.stat.exists

- name: Restart PHP service after rebuild
  ansible.builtin.command:
    cmd: docker compose up -d --force-recreate php
    chdir: "{{ project_path }}"
  register: php_restart
  changed_when: true
  when:
    - composer_json.stat.exists
    - docker_compose_for_build.stat.exists
    - composer_install.rc != 0
    - "'your php version' in composer_install.stderr"
    - "'does not satisfy that requirement' in composer_install.stderr"
    - php_dockerfile_stat.stat.exists

- name: Retry Composer install after PHP image adjustment
  ansible.builtin.command:
    cmd: docker compose exec -T php composer install --no-interaction --prefer-dist --optimize-autoloader
    chdir: "{{ project_path }}"
  register: composer_install_after_php_fix
  changed_when: "'Installing' in composer_install_after_php_fix.stdout or 'Updating' in composer_install_after_php_fix.stdout"
  when:
    - composer_json.stat.exists
    - docker_compose_for_build.stat.exists
    - composer_install.rc != 0
    - "'your php version' in composer_install.stderr"
    - "'does not satisfy that requirement' in composer_install.stderr"
    - php_dockerfile_stat.stat.exists

- name: Fail if Composer install still fails
  ansible.builtin.fail:
    msg: >-
      Composer install failed.
      Strict install rc={{ composer_install.rc }}.
      Retry rc={{ composer_install_after_php_fix.rc | default('not-run') }}.
      Check project dependencies and lockfile compatibility.
  when:
    - composer_json.stat.exists
    - docker_compose_for_build.stat.exists
    - composer_install.rc != 0
    - (composer_install_after_php_fix.rc | default(1)) != 0

- name: Check if package.json exists
  ansible.builtin.stat:
    path: "{{ project_path }}/package.json"
  register: package_json

- name: Ensure .nvmrc exists when node_version is configured
  ansible.builtin.copy:
    dest: "{{ project_path }}/.nvmrc"
    content: "{{ laravel_node_version }}\n"
    mode: '0644'
    force: false
  when:
    - package_json.stat.exists
    - laravel_node_version | length > 0

- name: Install Node dependencies via npm (locally, not in container)
  ansible.builtin.shell:
    cmd: |
      if [ -s "$HOME/.nvm/nvm.sh" ]; then
        . "$HOME/.nvm/nvm.sh"
        if [ -f .nvmrc ]; then
          nvm install >/dev/null
          nvm use >/dev/null
        fi
        npm install
      elif command -v mise >/dev/null 2>&1 && [ -f .nvmrc ]; then
        NODE_VERSION="$(tr -d '[:space:]' < .nvmrc)"
        mise exec "node@${NODE_VERSION}" -- npm install
      else
        npm install
      fi
    chdir: "{{ project_path }}"
  register: npm_install
  changed_when: "'added' in npm_install.stdout"
  failed_when: false
  when: package_json.stat.exists

- name: Retry npm install without lifecycle scripts for legacy frontend stacks
  ansible.builtin.shell:
    cmd: |
      if [ -s "$HOME/.nvm/nvm.sh" ]; then
        . "$HOME/.nvm/nvm.sh"
        if [ -f .nvmrc ]; then
          nvm install >/dev/null
          nvm use >/dev/null
        fi
        npm install --legacy-peer-deps --ignore-scripts
      elif command -v mise >/dev/null 2>&1 && [ -f .nvmrc ]; then
        NODE_VERSION="$(tr -d '[:space:]' < .nvmrc)"
        mise exec "node@${NODE_VERSION}" -- npm install --legacy-peer-deps --ignore-scripts
      else
        npm install --legacy-peer-deps --ignore-scripts
      fi
    chdir: "{{ project_path }}"
  register: npm_install_no_scripts
  changed_when: "'added' in npm_install_no_scripts.stdout"
  failed_when: false
  when:
    - package_json.stat.exists
    - npm_install.rc != 0
    - "'node-sass' in npm_install.stderr or 'node-gyp' in npm_install.stderr or 'python2' in npm_install.stderr or 'gyp ERR!' in npm_install.stderr"

- name: Fail npm install when error is not npm auth/private registry
  ansible.builtin.fail:
    msg: >-
      npm install failed (rc={{ npm_install.rc }}).
      no-scripts retry rc={{ npm_install_no_scripts.rc | default('not-run') }}.
      stderr={{ npm_install.stderr | default('') }}
  when:
    - package_json.stat.exists
    - npm_install.rc != 0
    - "'E401' not in npm_install.stderr"
    - "'Access token expired or revoked' not in npm_install.stderr"
    - "'@fortawesome/pro-' not in npm_install.stderr"
    - (npm_install_no_scripts.rc | default(1)) != 0

- name: Warn when npm installed without lifecycle scripts
  ansible.builtin.debug:
    msg: >-
      npm install succeeded only with --ignore-scripts (legacy node-sass/tooling).
      Frontend assets may require an older Node toolchain to build cleanly.
  when:
    - package_json.stat.exists
    - npm_install.rc != 0
    - (npm_install_no_scripts.rc | default(1)) == 0

- name: Warn when npm auth is required for private packages
  ansible.builtin.debug:
    msg: >-
      npm install requires private npm auth (token missing/expired).
      Ensure ~/.secrets/{{ project_name }}/.npmrc has a valid token,
      or run npm login in {{ project_path }} and re-run bootstrap.
  when:
    - package_json.stat.exists
    - npm_install.rc != 0
    - "'E401' in npm_install.stderr or 'Access token expired or revoked' in npm_install.stderr or '@fortawesome/pro-' in npm_install.stderr"

# === Clear and rebuild caches ===
- name: Clear Laravel config cache
  ansible.builtin.command:
    cmd: docker compose exec -T php php artisan config:clear
    chdir: "{{ project_path }}"
  register: config_clear
  changed_when: false
  failed_when: false
  when: docker_compose_for_build.stat.exists

- name: Clear Laravel application cache
  ansible.builtin.command:
    cmd: docker compose exec -T php php artisan cache:clear
    chdir: "{{ project_path }}"
  register: cache_clear
  changed_when: false
  failed_when: false
  when: docker_compose_for_build.stat.exists

- name: Cache Laravel config
  ansible.builtin.command:
    cmd: docker compose exec -T php php artisan config:cache
    chdir: "{{ project_path }}"
  register: config_cache
  changed_when: false
  failed_when: false
  when: docker_compose_for_build.stat.exists
